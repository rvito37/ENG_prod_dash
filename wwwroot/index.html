<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f6f9; font-family: 'Segoe UI', sans-serif; }
        .toolbar {
            background: linear-gradient(135deg, #1e3a5f 0%, #2d5f8a 100%);
            padding: .8rem 1.5rem;
            display: flex;
            align-items: center;
            gap: .8rem;
        }
        .toolbar select {
            min-width: 260px;
            background: rgba(255,255,255,.12);
            border: 1px solid rgba(255,255,255,.25);
            color: #fff;
            padding: .4rem .8rem;
            border-radius: 6px;
            font-size: .9rem;
            outline: none;
            cursor: pointer;
        }
        .toolbar select option { background: #1e3a5f; color: #fff; }
        .toolbar .btn-load {
            background: rgba(255,255,255,.18);
            border: 1px solid rgba(255,255,255,.3);
            color: #fff;
            padding: .4rem 1.2rem;
            border-radius: 6px;
            font-size: .9rem;
            cursor: pointer;
            transition: background .2s;
            white-space: nowrap;
        }
        .toolbar .btn-load:hover { background: rgba(255,255,255,.3); }
        .toolbar .btn-load:disabled { opacity: .5; cursor: not-allowed; }
        .spinner-sm { width: .9rem; height: .9rem; border-width: .15em; vertical-align: middle; }
        .content-area { margin: 1.5rem; }
        .card { border: none; border-radius: 10px; box-shadow: 0 2px 12px rgba(0,0,0,.08); }
        .placeholder-msg {
            text-align: center;
            color: #aaa;
            padding: 3rem 1rem;
            font-size: .95rem;
        }
    </style>
</head>
<body>
    <div class="toolbar">
        <select id="plineSelect">
            <option value="" disabled selected>-- Select Production Line --</option>
        </select>
        <button class="btn-load" onclick="loadLines()" id="btnLoad">
            Load Data
        </button>
        <span id="plineInfo" style="color:rgba(255,255,255,.75);font-size:.8rem;margin-left:auto;"></span>
    </div>

    <div class="content-area">
        <div id="alertBox" class="d-none"></div>
        <div style="display:flex;gap:1rem;align-items:flex-start;">
            <div id="infoArea" style="flex:0 0 auto;"></div>
            <div id="esnxxPanel" style="flex:0 0 auto;"></div>
            <div id="expqtyPanel" style="flex:0 0 auto;"></div>
            <div id="thqtyPanel" style="flex:0 0 auto;"></div>
        </div>
    </div>

    <script>
        let linesData = {};

        async function loadLines() {
            const btn = document.getElementById('btnLoad');
            const sel = document.getElementById('plineSelect');
            const alertBox = document.getElementById('alertBox');

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-sm text-light" role="status"></span> Loading...';
            alertBox.classList.add('d-none');

            try {
                const resp = await fetch('/api/data/pline');
                if (!resp.ok) throw new Error();
                const data = await resp.json();

                const idIdx = data.columns.indexOf('PLINE_ID');
                const nmIdx = data.columns.indexOf('PLINE_NM');
                const ptIdx = data.columns.indexOf('PTYPE_ID');
                const szIdx = data.columns.indexOf('SIZE_ID');
                const picIdx = data.columns.indexOf('PLINE_PIC');
                const hvIdx = data.columns.indexOf('HVAL_DT');
                const lvIdx = data.columns.indexOf('LVAL_DT');

                const sorted = [...data.rows].sort((a, b) => {
                    const pa = (a[ptIdx] || '').toString();
                    const pb = (b[ptIdx] || '').toString();
                    if (pa !== pb) return pa.localeCompare(pb);
                    return (a[idIdx] || '').toString().localeCompare((b[idIdx] || '').toString());
                });

                linesData = {};
                sel.innerHTML = '<option value="" disabled selected>-- Select Production Line --</option>';
                sorted.forEach(row => {
                    const id = row[idIdx];
                    const opt = document.createElement('option');
                    const sz = (row[szIdx] || '').toString().trim();
                    opt.value = id;
                    opt.textContent = row[ptIdx] + ' | ' + id + ' \u2014 ' + (row[nmIdx] || '') + (sz ? ' [' + sz + ']' : '');
                    sel.appendChild(opt);
                    linesData[id] = {
                        pic: (row[picIdx] || '').toString().trim(),
                        hval: row[hvIdx] ?? 0,
                        lval: row[lvIdx] ?? 0
                    };
                });
            } catch {
                alertBox.innerHTML = '<div class="alert alert-danger mb-0">Failed to load data.</div>';
                alertBox.classList.remove('d-none');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Load Data';
            }
        }

        function fmtVal(v) {
            if (v === null || v === undefined) return '0.000';
            const n = parseFloat(v);
            return isNaN(n) ? String(v) : n.toFixed(3);
        }

        document.getElementById('plineSelect').addEventListener('change', async function() {
            const id = this.value;
            const d = linesData[id] || {};

            document.getElementById('esnxxPanel').innerHTML = '';
            document.getElementById('expqtyPanel').innerHTML = '';
            document.getElementById('thqtyPanel').innerHTML = '';
            document.getElementById('plineInfo').innerHTML =
                'DT Range: <strong>' + fmtVal(d.hval) + ' &mdash; ' + fmtVal(d.lval) + '</strong>' +
                ' &nbsp;|&nbsp; Format: <strong style="font-family:monospace;letter-spacing:1px;">' + (d.pic || '') + '</strong>';
            document.getElementById('infoArea').innerHTML =
                '<div class="card">' +
                '  <div class="card-body p-3">' +
                '    <div id="btypeArea"><div style="color:#aaa;font-size:.85rem;">Loading...</div></div>' +
                '  </div>' +
                '</div>';

            try {
                const resp = await fetch('/api/data/btype/' + encodeURIComponent(id));
                if (!resp.ok) throw new Error();
                const entries = await resp.json();
                const area = document.getElementById('btypeArea');
                if (area) {
                    if (entries.length === 0) {
                        area.innerHTML = '<div style="color:#aaa;font-size:.85rem;">\u2014</div>';
                    } else {
                        let html = '<div style="max-height:280px;overflow-y:auto;border:1px solid #e9ecef;border-radius:6px;max-width:420px;">';
                        html += '<table style="width:100%;font-size:.82rem;border-collapse:collapse;">';
                        html += '<thead><tr style="background:#f8f9fa;position:sticky;top:0;">';
                        html += '<th style="padding:5px 10px;border-bottom:1px solid #dee2e6;color:#555;">B_TYPE</th>';
                        html += '<th style="padding:5px 10px;border-bottom:1px solid #dee2e6;color:#555;">ESNXX</th>';
                        html += '<th style="padding:5px 10px;border-bottom:1px solid #dee2e6;color:#555;">Route Card Description</th>';
                        html += '</tr></thead><tbody>';
                        entries.forEach(e => {
                            html += '<tr style="cursor:pointer;" onmouseover="this.style.background=\'#e8f0fe\'" onmouseout="this.style.background=\'\'" onclick="loadDetails(\'' + (e.esnxx || '').replace(/'/g, "\\'") + '\', \'' + (e.btype || '').replace(/'/g, "\\'") + '\', \'' + id.replace(/'/g, "\\'") + '\', this)">';
                            html += '<td style="padding:4px 10px;border-bottom:1px solid #f0f0f0;">' + (e.btype || '') + '</td>';
                            html += '<td style="padding:4px 10px;border-bottom:1px solid #f0f0f0;">' + (e.esnxx || '') + '</td>';
                            html += '<td style="padding:4px 10px;border-bottom:1px solid #f0f0f0;">' + (e.name || '') + '</td>';
                            html += '</tr>';
                        });
                        html += '</tbody></table></div>';
                        area.innerHTML = html;
                        document.getElementById('esnxxPanel').innerHTML = '';
                    }
                }
            } catch {}
        });

        async function loadDetails(esnxxId, btypeId, plineId, rowEl) {
            // highlight selected row
            document.querySelectorAll('#btypeArea tr[style*="cursor"]').forEach(r => r.style.background = '');
            if (rowEl) rowEl.style.background = '#e8f0fe';

            // Load ESNXX
            const panel = document.getElementById('esnxxPanel');
            panel.innerHTML = '<div class="card"><div class="card-body p-3"><div style="color:#aaa;font-size:.85rem;">Loading...</div></div></div>';
            try {
                const resp = await fetch('/api/data/esnxx/' + encodeURIComponent(esnxxId));
                if (!resp.ok) throw new Error();
                const entries = await resp.json();
                if (entries.length === 0) {
                    panel.innerHTML = '<div class="card"><div class="card-body p-3"><div style="color:#aaa;font-size:.85rem;">No ESNXX data</div></div></div>';
                } else {
                    let html = '<div class="card"><div class="card-body p-3">';
                    html += '<div style="font-size:.82rem;color:#888;margin-bottom:6px;">ESNXX: <strong style="color:#333;">' + esnxxId + '</strong></div>';
                    entries.forEach(e => {
                        if (e.name) html += '<div style="font-size:.82rem;margin-bottom:4px;">' + e.name + '</div>';
                        if (e.lines && e.lines.length > 0) {
                            html += '<div style="max-height:200px;overflow-y:auto;border:1px solid #e9ecef;border-radius:6px;min-width:220px;">';
                            html += '<table style="width:100%;font-size:.8rem;border-collapse:collapse;">';
                            e.lines.forEach(ln => {
                                html += '<tr><td style="padding:3px 10px;border-bottom:1px solid #f0f0f0;">' + ln + '</td></tr>';
                            });
                            html += '</table></div>';
                        }
                    });
                    html += '</div></div>';
                    panel.innerHTML = html;
                }
            } catch {
                panel.innerHTML = '<div class="card"><div class="card-body p-3"><div style="color:#c00;font-size:.85rem;">Error</div></div></div>';
            }

            // Load EXPQTY
            const expPanel = document.getElementById('expqtyPanel');
            expPanel.innerHTML = '<div class="card"><div class="card-body p-3"><div style="color:#aaa;font-size:.85rem;">Loading...</div></div></div>';
            try {
                const resp2 = await fetch('/api/data/expqty/' + encodeURIComponent(btypeId));
                if (!resp2.ok) throw new Error();
                const rows = await resp2.json();
                if (rows.length === 0) {
                    expPanel.innerHTML = '';
                } else {
                    let html = '<div class="card"><div class="card-body p-3">';
                    html += '<div style="font-size:.82rem;color:#888;margin-bottom:6px;">Expected Qty: <strong style="color:#333;">' + btypeId + '</strong></div>';
                    html += '<div style="max-height:220px;overflow-y:auto;border:1px solid #e9ecef;border-radius:6px;">';
                    html += '<table style="width:100%;font-size:.78rem;border-collapse:collapse;">';
                    html += '<thead><tr style="background:#f8f9fa;position:sticky;top:0;">';
                    html += '<th style="padding:4px 6px;border-bottom:1px solid #dee2e6;color:#555;">SIZE</th>';
                    html += '<th style="padding:4px 6px;border-bottom:1px solid #dee2e6;color:#555;">LVAL</th>';
                    html += '<th style="padding:4px 6px;border-bottom:1px solid #dee2e6;color:#555;">HVAL</th>';
                    html += '<th style="padding:4px 6px;border-bottom:1px solid #dee2e6;color:#555;">TOL</th>';
                    html += '<th style="padding:4px 6px;border-bottom:1px solid #dee2e6;color:#555;">UOM</th>';
                    html += '<th style="padding:4px 6px;border-bottom:1px solid #dee2e6;color:#555;">EXP_YLD</th>';
                    html += '</tr></thead><tbody>';
                    rows.forEach(r => {
                        html += '<tr>';
                        html += '<td style="padding:3px 6px;border-bottom:1px solid #f0f0f0;">' + (r.sizeId || '') + '</td>';
                        html += '<td style="padding:3px 6px;border-bottom:1px solid #f0f0f0;">' + (r.lvalLim ?? '') + '</td>';
                        html += '<td style="padding:3px 6px;border-bottom:1px solid #f0f0f0;">' + (r.hvalLim ?? '') + '</td>';
                        html += '<td style="padding:3px 6px;border-bottom:1px solid #f0f0f0;">' + (r.tolId || '') + '</td>';
                        html += '<td style="padding:3px 6px;border-bottom:1px solid #f0f0f0;">' + (r.uomId || '') + '</td>';
                        html += '<td style="padding:3px 6px;border-bottom:1px solid #f0f0f0;">' + (r.expYld ?? '') + '</td>';
                        html += '</tr>';
                    });
                    html += '</tbody></table></div></div></div>';
                    expPanel.innerHTML = html;
                }
            } catch {
                expPanel.innerHTML = '';
            }

            // Load THQTY
            const thPanel = document.getElementById('thqtyPanel');
            thPanel.innerHTML = '<div class="card"><div class="card-body p-3"><div style="color:#aaa;font-size:.85rem;">Loading...</div></div></div>';
            try {
                const resp3 = await fetch('/api/data/thqty/' + encodeURIComponent(btypeId) + '/' + encodeURIComponent(plineId));
                if (!resp3.ok) throw new Error();
                const thRows = await resp3.json();
                if (thRows.length === 0) {
                    thPanel.innerHTML = '';
                } else {
                    let html = '<div class="card"><div class="card-body p-3">';
                    html += '<div style="font-size:.82rem;color:#888;margin-bottom:6px;">Threshold Qty: <strong style="color:#333;">' + btypeId + '</strong></div>';
                    html += '<div style="max-height:220px;overflow-y:auto;border:1px solid #e9ecef;border-radius:6px;">';
                    html += '<table style="width:100%;font-size:.78rem;border-collapse:collapse;">';
                    html += '<thead><tr style="background:#f8f9fa;position:sticky;top:0;">';
                    html += '<th style="padding:4px 6px;border-bottom:1px solid #dee2e6;color:#555;">SIZE</th>';
                    html += '<th style="padding:4px 6px;border-bottom:1px solid #dee2e6;color:#555;">ORIG_UOM</th>';
                    html += '<th style="padding:4px 6px;border-bottom:1px solid #dee2e6;color:#555;">CONV_UOM</th>';
                    html += '<th style="padding:4px 6px;border-bottom:1px solid #dee2e6;color:#555;">TH_QTY</th>';
                    html += '<th style="padding:4px 6px;border-bottom:1px solid #dee2e6;color:#555;">L_VAL</th>';
                    html += '<th style="padding:4px 6px;border-bottom:1px solid #dee2e6;color:#555;">H_VAL</th>';
                    html += '</tr></thead><tbody>';
                    thRows.forEach(r => {
                        html += '<tr>';
                        html += '<td style="padding:3px 6px;border-bottom:1px solid #f0f0f0;">' + (r.sizeId || '') + '</td>';
                        html += '<td style="padding:3px 6px;border-bottom:1px solid #f0f0f0;">' + (r.origUom || '') + '</td>';
                        html += '<td style="padding:3px 6px;border-bottom:1px solid #f0f0f0;">' + (r.convUom || '') + '</td>';
                        html += '<td style="padding:3px 6px;border-bottom:1px solid #f0f0f0;">' + (r.thQty ?? '') + '</td>';
                        html += '<td style="padding:3px 6px;border-bottom:1px solid #f0f0f0;">' + (r.lVal ?? '') + '</td>';
                        html += '<td style="padding:3px 6px;border-bottom:1px solid #f0f0f0;">' + (r.hVal ?? '') + '</td>';
                        html += '</tr>';
                    });
                    html += '</tbody></table></div></div></div>';
                    thPanel.innerHTML = html;
                }
            } catch {
                thPanel.innerHTML = '';
            }
        }

        loadLines();
    </script>
</body>
</html>
