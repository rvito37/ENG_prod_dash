<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f6f9; font-family: 'Segoe UI', sans-serif; }
        .toolbar {
            background: linear-gradient(135deg, #1e3a5f 0%, #2d5f8a 100%);
            padding: .8rem 1.5rem;
            display: flex;
            align-items: center;
            gap: .8rem;
        }
        .toolbar select {
            min-width: 260px;
            background: rgba(255,255,255,.12);
            border: 1px solid rgba(255,255,255,.25);
            color: #fff;
            padding: .4rem .8rem;
            border-radius: 6px;
            font-size: .9rem;
            outline: none;
            cursor: pointer;
        }
        .toolbar select option { background: #1e3a5f; color: #fff; }
        .toolbar .btn-load {
            background: rgba(255,255,255,.18);
            border: 1px solid rgba(255,255,255,.3);
            color: #fff;
            padding: .4rem 1.2rem;
            border-radius: 6px;
            font-size: .9rem;
            cursor: pointer;
            transition: background .2s;
            white-space: nowrap;
        }
        .toolbar .btn-load:hover { background: rgba(255,255,255,.3); }
        .toolbar .btn-load:disabled { opacity: .5; cursor: not-allowed; }
        .spinner-sm { width: .9rem; height: .9rem; border-width: .15em; vertical-align: middle; }
        .content-area { margin: 1.5rem; }
        .card { border: none; border-radius: 10px; box-shadow: 0 2px 12px rgba(0,0,0,.08); }
        .placeholder-msg {
            text-align: center;
            color: #aaa;
            padding: 3rem 1rem;
            font-size: .95rem;
        }
    </style>
</head>
<body>
    <div class="toolbar">
        <select id="plineSelect">
            <option value="" disabled selected>-- Select Production Line --</option>
        </select>
        <button class="btn-load" onclick="loadLines()" id="btnLoad">
            Load Data
        </button>
    </div>

    <div class="content-area">
        <div id="alertBox" class="d-none"></div>
        <div id="infoArea"></div>
    </div>

    <script>
        async function loadLines() {
            const btn = document.getElementById('btnLoad');
            const sel = document.getElementById('plineSelect');
            const alertBox = document.getElementById('alertBox');

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-sm text-light" role="status"></span> Loading...';
            alertBox.classList.add('d-none');

            try {
                const resp = await fetch('/api/data/pline');
                if (!resp.ok) throw new Error();
                const data = await resp.json();

                const idIdx = data.columns.indexOf('PLINE_ID');
                const nmIdx = data.columns.indexOf('PLINE_NM');

                sel.innerHTML = '<option value="" disabled selected>-- Select Production Line --</option>';
                data.rows.forEach(row => {
                    const opt = document.createElement('option');
                    opt.value = row[idIdx];
                    opt.textContent = row[idIdx] + ' \u2014 ' + (row[nmIdx] || '');
                    sel.appendChild(opt);
                });
            } catch {
                alertBox.innerHTML = '<div class="alert alert-danger mb-0">Failed to load data.</div>';
                alertBox.classList.remove('d-none');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Load Data';
            }
        }

        document.getElementById('plineSelect').addEventListener('change', function() {
            const id = this.value;
            const text = this.options[this.selectedIndex].textContent;
            document.getElementById('infoArea').innerHTML =
                '<div class="card"><div class="card-body p-3 placeholder-msg">Selected: <strong>' + text + '</strong></div></div>';
        });
    </script>
</body>
</html>
