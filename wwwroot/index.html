<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DashLine</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f6f9; font-family: 'Segoe UI', sans-serif; position: relative; }
        .toolbar {
            background: linear-gradient(135deg, #1e3a5f 0%, #2d5f8a 100%);
            padding: .8rem 1.5rem;
            display: flex;
            align-items: center;
            gap: .8rem;
        }
        .toolbar select {
            min-width: 260px;
            background: rgba(255,255,255,.12);
            border: 1px solid rgba(255,255,255,.25);
            color: #fff;
            padding: .4rem .8rem;
            border-radius: 6px;
            font-size: .9rem;
            outline: none;
            cursor: pointer;
        }
        .toolbar select option { background: #1e3a5f; color: #fff; }
        .toolbar .btn-load {
            background: rgba(255,255,255,.18);
            border: 1px solid rgba(255,255,255,.3);
            color: #fff;
            padding: .4rem 1.2rem;
            border-radius: 6px;
            font-size: .9rem;
            cursor: pointer;
            transition: background .2s;
            white-space: nowrap;
        }
        .toolbar .btn-load:hover { background: rgba(255,255,255,.3); }
        .toolbar .btn-load:disabled { opacity: .5; cursor: not-allowed; }
        .spinner-sm { width: .9rem; height: .9rem; border-width: .15em; vertical-align: middle; }
        .content-area { margin: 1.5rem; }
        .card { border: none; border-radius: 10px; box-shadow: 0 2px 12px rgba(0,0,0,.08); }
        .placeholder-msg {
            text-align: center;
            color: #aaa;
            padding: 3rem 1rem;
            font-size: .95rem;
        }
        .panel-title {
            font-size: .75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #1e3a5f;
            border-bottom: 2px solid #2d5f8a;
            padding-bottom: 4px;
            margin-bottom: 8px;
        }
        .key-badge {
            display: inline-block;
            font-size: .58rem;
            padding: 1px 5px;
            border-radius: 3px;
            margin-left: 5px;
            vertical-align: middle;
            font-weight: 500;
            letter-spacing: .5px;
        }
        .key-pline { background: #a5d8ff; color: #1864ab; }
        .key-btype { background: #ffec99; color: #664d00; }
        .key-esnxx { background: #b2f2bb; color: #2b8a3e; }
    </style>
</head>
<body>
    <div class="toolbar">
        <span style="font-size:.85rem;font-weight:600;color:#fff;letter-spacing:.5px;margin-right:.5rem;line-height:1.2;"><span style="opacity:.7;">Production Control /</span> Engineering Info Tool</span>
        <span style="width:1px;height:24px;background:rgba(255,255,255,.3);"></span>
        <select id="plineSelect">
            <option value="" disabled selected>-- Select Production Line --</option>
        </select>
        <button class="btn-load" onclick="loadLines()" id="btnLoad">
            Load Data
        </button>
        <span id="plineInfo" style="color:rgba(255,255,255,.75);font-size:.8rem;margin-left:auto;"></span>
    </div>

    <svg id="arrowsSvg" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10;">
        <defs>
            <marker id="ah-btype" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
                <polygon points="0 0, 8 3, 0 6" fill="#d4a017"/>
            </marker>
            <marker id="ah-esnxx" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
                <polygon points="0 0, 8 3, 0 6" fill="#2b8a3e"/>
            </marker>
            <marker id="ah-pline" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
                <polygon points="0 0, 8 3, 0 6" fill="#1864ab"/>
            </marker>
        </defs>
    </svg>

    <div class="content-area">
        <div id="alertBox" class="d-none"></div>
        <div style="display:flex;gap:1rem;align-items:stretch;">
            <div id="infoArea" style="flex:1 1 0;min-width:0;"></div>
            <div id="esnxxPanel" style="flex:1 1 0;min-width:0;"></div>
            <div id="expqtyPanel" style="flex:1 1 0;min-width:0;"></div>
            <div id="thqtyPanel" style="flex:1 1 0;min-width:0;"></div>
            <div id="leadtPanel" style="flex:1 1 0;min-width:0;"></div>
        </div>
        <div id="dlinePanel" style="margin-top:1rem;"></div>
    </div>

    <script>
        let linesData = {};

        async function loadLines() {
            const btn = document.getElementById('btnLoad');
            const sel = document.getElementById('plineSelect');
            const alertBox = document.getElementById('alertBox');

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-sm text-light" role="status"></span> Loading...';
            alertBox.classList.add('d-none');

            try {
                const resp = await fetch('/api/data/pline');
                if (!resp.ok) throw new Error();
                const data = await resp.json();

                const idIdx = data.columns.indexOf('PLINE_ID');
                const nmIdx = data.columns.indexOf('PLINE_NM');
                const ptIdx = data.columns.indexOf('PTYPE_ID');
                const szIdx = data.columns.indexOf('SIZE_ID');
                const picIdx = data.columns.indexOf('PLINE_PIC');
                const hvIdx = data.columns.indexOf('HVAL_DT');
                const lvIdx = data.columns.indexOf('LVAL_DT');

                const sorted = [...data.rows].sort((a, b) => {
                    const pa = (a[ptIdx] || '').toString();
                    const pb = (b[ptIdx] || '').toString();
                    if (pa !== pb) return pa.localeCompare(pb);
                    return (a[idIdx] || '').toString().localeCompare((b[idIdx] || '').toString());
                });

                linesData = {};
                sel.innerHTML = '<option value="" disabled selected>-- Select Production Line --</option>';
                sorted.forEach(row => {
                    const id = row[idIdx];
                    const opt = document.createElement('option');
                    const sz = (row[szIdx] || '').toString().trim();
                    opt.value = id;
                    opt.textContent = row[ptIdx] + ' | ' + id + ' \u2014 ' + (row[nmIdx] || '') + (sz ? ' [' + sz + ']' : '');
                    sel.appendChild(opt);
                    linesData[id] = {
                        ptype: (row[ptIdx] || '').toString().trim(),
                        pic: (row[picIdx] || '').toString().trim(),
                        hval: row[hvIdx] ?? 0,
                        lval: row[lvIdx] ?? 0
                    };
                });
            } catch {
                alertBox.innerHTML = '<div class="alert alert-danger mb-0">Failed to load data.</div>';
                alertBox.classList.remove('d-none');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Load Data';
            }
        }

        function fmtVal(v) {
            if (v === null || v === undefined) return '0.000';
            const n = parseFloat(v);
            return isNaN(n) ? String(v) : n.toFixed(3);
        }

        document.getElementById('plineSelect').addEventListener('change', async function() {
            const id = this.value;
            const d = linesData[id] || {};

            document.getElementById('esnxxPanel').innerHTML = '';
            document.getElementById('expqtyPanel').innerHTML = '';
            document.getElementById('thqtyPanel').innerHTML = '';
            loadLeadt(id);
            document.getElementById('plineInfo').innerHTML =
                'DT Range: <strong>' + fmtVal(d.hval) + ' &mdash; ' + fmtVal(d.lval) + '</strong>' +
                ' &nbsp;|&nbsp; Format: <strong style="font-family:monospace;letter-spacing:1px;">' + (d.pic || '') + '</strong>';
            document.getElementById('infoArea').innerHTML =
                '<div class="card">' +
                '  <div class="card-body p-3">' +
                '    <div id="btypeArea"><div style="color:#aaa;font-size:.85rem;">Loading...</div></div>' +
                '  </div>' +
                '</div>';

            try {
                const resp = await fetch('/api/data/btype/' + encodeURIComponent(id));
                if (!resp.ok) throw new Error();
                const entries = await resp.json();
                const area = document.getElementById('btypeArea');
                if (area) {
                    if (entries.length === 0) {
                        area.innerHTML = '<div style="color:#aaa;font-size:.85rem;">\u2014</div>';
                    } else {
                        let html = '<div style="max-height:280px;overflow-y:auto;border:1px solid #e9ecef;border-radius:6px;">';
                        html += '<table style="width:100%;font-size:.82rem;border-collapse:collapse;">';
                        html += '<thead><tr style="background:#f8f9fa;position:sticky;top:0;">';
                        html += '<th style="padding:5px 10px;border-bottom:1px solid #dee2e6;color:#555;background:#fff9db;">B_TYPE</th>';
                        html += '<th style="padding:5px 10px;border-bottom:1px solid #dee2e6;color:#555;background:#ebfbee;">ESNXX</th>';
                        html += '<th style="padding:5px 10px;border-bottom:1px solid #dee2e6;color:#555;">Route Card Description</th>';
                        html += '</tr></thead><tbody>';
                        entries.forEach(e => {
                            html += '<tr style="cursor:pointer;" onmouseover="this.style.background=\'#e8f0fe\'" onmouseout="this.style.background=\'\'" onclick="loadDetails(\'' + (e.esnxx || '').replace(/'/g, "\\'") + '\', \'' + (e.btype || '').replace(/'/g, "\\'") + '\', \'' + id.replace(/'/g, "\\'") + '\', this)">';
                            html += '<td style="padding:4px 10px;border-bottom:1px solid #f0f0f0;background:#fff9db;">' + (e.btype || '') + '</td>';
                            html += '<td style="padding:4px 10px;border-bottom:1px solid #f0f0f0;background:#ebfbee;">' + (e.esnxx || '') + '</td>';
                            html += '<td style="padding:4px 10px;border-bottom:1px solid #f0f0f0;">' + (e.name || '') + '</td>';
                            html += '</tr>';
                        });
                        html += '</tbody></table></div>';
                        area.innerHTML = html;
                        document.getElementById('esnxxPanel').innerHTML = '';
                        setTimeout(drawArrows, 50);
                    }
                }
            } catch {}

            // Load D_LINE
            const dPanel = document.getElementById('dlinePanel');
            dPanel.innerHTML = '<div class="card"><div class="card-body p-3"><div style="color:#aaa;font-size:.85rem;">Loading batches...</div></div></div>';
            try {
                const ptype = d.ptype || '';
                const resp2 = await fetch('/api/data/dline/' + encodeURIComponent(ptype) + '/' + encodeURIComponent(id));
                if (!resp2.ok) throw new Error();
                const batches = await resp2.json();
                if (batches.length === 0) {
                    dPanel.innerHTML = '<div class="card"><div class="card-body p-3"><div style="color:#aaa;font-size:.85rem;">No open batches</div></div></div>';
                } else {
                    let html = '<div class="card"><div class="card-body p-3">';
                    html += '<div class="panel-title">Open Batches (' + batches.length + ') <span class="key-badge key-pline">PLINE</span></div>';
                    html += '<div style="max-height:300px;overflow-y:auto;border:1px solid #e9ecef;border-radius:6px;">';
                    html += '<table style="width:100%;font-size:.78rem;border-collapse:collapse;">';
                    html += '<thead><tr style="background:#f8f9fa;position:sticky;top:0;">';
                    html += '<th style="padding:4px 6px;border-bottom:1px solid #dee2e6;color:#555;">Purp</th>';
                    html += '<th style="padding:4px 6px;border-bottom:1px solid #dee2e6;color:#555;">Batch#</th>';
                    html += '<th style="padding:4px 6px;border-bottom:1px solid #dee2e6;color:#555;">ESN</th>';
                    html += '<th style="padding:4px 6px;border-bottom:1px solid #dee2e6;color:#555;">Stat</th>';
                    html += '<th style="padding:4px 6px;border-bottom:1px solid #dee2e6;color:#555;">Prior</th>';
                    html += '<th style="padding:4px 6px;border-bottom:1px solid #dee2e6;color:#555;">Promised</th>';
                    html += '<th style="padding:4px 6px;border-bottom:1px solid #dee2e6;color:#555;text-align:right;">Qty P</th>';
                    html += '<th style="padding:4px 6px;border-bottom:1px solid #dee2e6;color:#555;text-align:right;">Qty S</th>';
                    html += '<th style="padding:4px 6px;border-bottom:1px solid #dee2e6;color:#555;text-align:right;">Qty W</th>';
                    html += '<th style="padding:4px 6px;border-bottom:1px solid #dee2e6;color:#555;">Process</th>';
                    html += '</tr></thead><tbody>';
                    batches.forEach(b => {
                        const prom = b.promised ? b.promised.substring(0, 10) : '';
                        html += '<tr>';
                        html += '<td style="padding:3px 6px;border-bottom:1px solid #f0f0f0;">' + (b.purp || '') + '</td>';
                        html += '<td style="padding:3px 6px;border-bottom:1px solid #f0f0f0;">' + (b.batchId || '') + '</td>';
                        html += '<td style="padding:3px 6px;border-bottom:1px solid #f0f0f0;font-size:.72rem;">' + (b.esn || '') + '</td>';
                        html += '<td style="padding:3px 6px;border-bottom:1px solid #f0f0f0;">' + (b.stat || '') + '</td>';
                        html += '<td style="padding:3px 6px;border-bottom:1px solid #f0f0f0;">' + (b.prior || '') + '</td>';
                        html += '<td style="padding:3px 6px;border-bottom:1px solid #f0f0f0;">' + prom + '</td>';
                        html += '<td style="padding:3px 6px;border-bottom:1px solid #f0f0f0;text-align:right;">' + (b.qtyP || '') + '</td>';
                        html += '<td style="padding:3px 6px;border-bottom:1px solid #f0f0f0;text-align:right;">' + (b.qtyS || '') + '</td>';
                        html += '<td style="padding:3px 6px;border-bottom:1px solid #f0f0f0;text-align:right;">' + (b.qtyW || '') + '</td>';
                        html += '<td style="padding:3px 6px;border-bottom:1px solid #f0f0f0;">' + (b.proc || '') + '</td>';
                        html += '</tr>';
                    });
                    html += '</tbody></table></div></div></div>';
                    dPanel.innerHTML = html;
                }
            } catch {
                dPanel.innerHTML = '';
            }
        });

        async function loadDetails(esnxxId, btypeId, plineId, rowEl) {
            // highlight selected row
            document.querySelectorAll('#btypeArea tr[style*="cursor"]').forEach(r => r.style.background = '');
            if (rowEl) rowEl.style.background = '#e8f0fe';

            // Load ESNXX
            const panel = document.getElementById('esnxxPanel');
            panel.innerHTML = '<div class="card"><div class="card-body p-3"><div style="color:#aaa;font-size:.85rem;">Loading...</div></div></div>';
            try {
                const resp = await fetch('/api/data/esnxx/' + encodeURIComponent(esnxxId));
                if (!resp.ok) throw new Error();
                const entries = await resp.json();
                if (entries.length === 0) {
                    panel.innerHTML = '<div class="card"><div class="card-body p-3"><div style="color:#aaa;font-size:.85rem;">No ESNXX data</div></div></div>';
                } else {
                    let html = '<div class="card"><div class="card-body p-3">';
                    html += '<div class="panel-title">Spec <span class="key-badge key-esnxx">ESNXX</span></div>';
                    html += '<div style="font-size:.82rem;color:#888;margin-bottom:6px;">ESNXX: <strong style="color:#333;">' + esnxxId + '</strong></div>';
                    entries.forEach(e => {
                        if (e.name) html += '<div style="font-size:.82rem;margin-bottom:4px;">' + e.name + '</div>';
                        if (e.lines && e.lines.length > 0) {
                            html += '<div style="max-height:200px;overflow-y:auto;border:1px solid #e9ecef;border-radius:6px;">';
                            html += '<table style="width:100%;font-size:.8rem;border-collapse:collapse;">';
                            e.lines.forEach(ln => {
                                html += '<tr><td style="padding:3px 10px;border-bottom:1px solid #f0f0f0;">' + ln + '</td></tr>';
                            });
                            html += '</table></div>';
                        }
                    });
                    html += '</div></div>';
                    panel.innerHTML = html;
                }
            } catch {
                panel.innerHTML = '<div class="card"><div class="card-body p-3"><div style="color:#c00;font-size:.85rem;">Error</div></div></div>';
            }

            // Load EXPQTY
            const expPanel = document.getElementById('expqtyPanel');
            expPanel.innerHTML = '<div class="card"><div class="card-body p-3"><div style="color:#aaa;font-size:.85rem;">Loading...</div></div></div>';
            try {
                const resp2 = await fetch('/api/data/expqty/' + encodeURIComponent(btypeId));
                if (!resp2.ok) throw new Error();
                const rows = await resp2.json();
                if (rows.length === 0) {
                    expPanel.innerHTML = '';
                } else {
                    let html = '<div class="card"><div class="card-body p-3">';
                    html += '<div class="panel-title">Expected Qty <span class="key-badge key-btype">B_TYPE</span></div>';
                    html += '<div style="max-height:220px;overflow-y:auto;border:1px solid #e9ecef;border-radius:6px;">';
                    html += '<table style="width:100%;font-size:.78rem;border-collapse:collapse;">';
                    html += '<thead><tr style="background:#f8f9fa;position:sticky;top:0;">';
                    html += '<th style="padding:4px 6px;border-bottom:1px solid #dee2e6;color:#555;">SIZE</th>';
                    html += '<th style="padding:4px 6px;border-bottom:1px solid #dee2e6;color:#555;">LVAL</th>';
                    html += '<th style="padding:4px 6px;border-bottom:1px solid #dee2e6;color:#555;">HVAL</th>';
                    html += '<th style="padding:4px 6px;border-bottom:1px solid #dee2e6;color:#555;">TOL</th>';
                    html += '<th style="padding:4px 6px;border-bottom:1px solid #dee2e6;color:#555;">UOM</th>';
                    html += '<th style="padding:4px 6px;border-bottom:1px solid #dee2e6;color:#555;">EXP_YLD</th>';
                    html += '</tr></thead><tbody>';
                    rows.forEach(r => {
                        html += '<tr>';
                        html += '<td style="padding:3px 6px;border-bottom:1px solid #f0f0f0;">' + (r.sizeId || '') + '</td>';
                        html += '<td style="padding:3px 6px;border-bottom:1px solid #f0f0f0;">' + (r.lvalLim ?? '') + '</td>';
                        html += '<td style="padding:3px 6px;border-bottom:1px solid #f0f0f0;">' + (r.hvalLim ?? '') + '</td>';
                        html += '<td style="padding:3px 6px;border-bottom:1px solid #f0f0f0;">' + (r.tolId || '') + '</td>';
                        html += '<td style="padding:3px 6px;border-bottom:1px solid #f0f0f0;">' + (r.uomId || '') + '</td>';
                        html += '<td style="padding:3px 6px;border-bottom:1px solid #f0f0f0;">' + (r.expYld ?? '') + '</td>';
                        html += '</tr>';
                    });
                    html += '</tbody></table></div></div></div>';
                    expPanel.innerHTML = html;
                }
            } catch {
                expPanel.innerHTML = '';
            }

            // Load THQTY
            const thPanel = document.getElementById('thqtyPanel');
            thPanel.innerHTML = '<div class="card"><div class="card-body p-3"><div style="color:#aaa;font-size:.85rem;">Loading...</div></div></div>';
            try {
                const resp3 = await fetch('/api/data/thqty/' + encodeURIComponent(btypeId) + '/' + encodeURIComponent(plineId));
                if (!resp3.ok) throw new Error();
                const thRows = await resp3.json();
                if (thRows.length === 0) {
                    thPanel.innerHTML = '';
                } else {
                    let html = '<div class="card"><div class="card-body p-3">';
                    html += '<div class="panel-title">Theoretical <span class="key-badge key-btype">B_TYPE</span><span class="key-badge key-pline">PLINE</span></div>';
                    html += '<div style="max-height:220px;overflow-y:auto;border:1px solid #e9ecef;border-radius:6px;">';
                    html += '<table style="width:100%;font-size:.78rem;border-collapse:collapse;">';
                    html += '<thead><tr style="background:#f8f9fa;position:sticky;top:0;">';
                    html += '<th style="padding:4px 6px;border-bottom:1px solid #dee2e6;color:#555;">SIZE</th>';
                    html += '<th style="padding:4px 6px;border-bottom:1px solid #dee2e6;color:#555;">ORIG_UOM</th>';
                    html += '<th style="padding:4px 6px;border-bottom:1px solid #dee2e6;color:#555;">CONV_UOM</th>';
                    html += '<th style="padding:4px 6px;border-bottom:1px solid #dee2e6;color:#555;">TH_QTY</th>';
                    html += '<th style="padding:4px 6px;border-bottom:1px solid #dee2e6;color:#555;">L_VAL</th>';
                    html += '<th style="padding:4px 6px;border-bottom:1px solid #dee2e6;color:#555;">H_VAL</th>';
                    html += '</tr></thead><tbody>';
                    thRows.forEach(r => {
                        html += '<tr>';
                        html += '<td style="padding:3px 6px;border-bottom:1px solid #f0f0f0;">' + (r.sizeId || '') + '</td>';
                        html += '<td style="padding:3px 6px;border-bottom:1px solid #f0f0f0;">' + (r.origUom || '') + '</td>';
                        html += '<td style="padding:3px 6px;border-bottom:1px solid #f0f0f0;">' + (r.convUom || '') + '</td>';
                        html += '<td style="padding:3px 6px;border-bottom:1px solid #f0f0f0;">' + (r.thQty ?? '') + '</td>';
                        html += '<td style="padding:3px 6px;border-bottom:1px solid #f0f0f0;">' + (r.lVal ?? '') + '</td>';
                        html += '<td style="padding:3px 6px;border-bottom:1px solid #f0f0f0;">' + (r.hVal ?? '') + '</td>';
                        html += '</tr>';
                    });
                    html += '</tbody></table></div></div></div>';
                    thPanel.innerHTML = html;
                }
            } catch {
                thPanel.innerHTML = '';
            }
            setTimeout(drawArrows, 100);
        }

        async function loadLeadt(plineId) {
            const panel = document.getElementById('leadtPanel');
            panel.innerHTML = '<div class="card"><div class="card-body p-3"><div style="color:#aaa;font-size:.85rem;">Loading...</div></div></div>';
            try {
                const resp = await fetch('/api/data/leadt/' + encodeURIComponent(plineId));
                if (!resp.ok) throw new Error();
                const rows = await resp.json();
                if (rows.length === 0) {
                    panel.innerHTML = '';
                    return;
                }
                let html = '<div class="card"><div class="card-body p-3">';
                html += '<div class="panel-title">Lead Times (' + rows.length + ') <span class="key-badge key-pline">PLINE</span></div>';
                html += '<div style="max-height:220px;overflow-y:auto;border:1px solid #e9ecef;border-radius:6px;">';
                html += '<table style="width:100%;font-size:.78rem;border-collapse:collapse;">';
                html += '<thead><tr style="background:#f8f9fa;position:sticky;top:0;">';
                html += '<th style="padding:4px 6px;border-bottom:1px solid #dee2e6;color:#555;">PTYPE</th>';
                html += '<th style="padding:4px 6px;border-bottom:1px solid #dee2e6;color:#555;">PROC_ID</th>';
                html += '<th style="padding:4px 6px;border-bottom:1px solid #dee2e6;color:#555;">DAYS</th>';
                html += '</tr></thead><tbody>';
                rows.forEach(r => {
                    html += '<tr>';
                    html += '<td style="padding:3px 6px;border-bottom:1px solid #f0f0f0;">' + (r.ptypeId || '') + '</td>';
                    html += '<td style="padding:3px 6px;border-bottom:1px solid #f0f0f0;">' + (r.procId || '') + '</td>';
                    html += '<td style="padding:3px 6px;border-bottom:1px solid #f0f0f0;">' + (r.leadtDays ?? '') + '</td>';
                    html += '</tr>';
                });
                html += '</tbody></table></div></div></div>';
                panel.innerHTML = html;
            } catch {
                panel.innerHTML = '';
            }
        }

        function drawArrows() {
            const svg = document.getElementById('arrowsSvg');
            // Remove old arrows
            svg.querySelectorAll('.dep-arrow').forEach(e => e.remove());
            // Resize SVG to full page
            svg.style.height = document.body.scrollHeight + 'px';

            function getCenter(el) {
                if (!el) return null;
                const r = el.getBoundingClientRect();
                return { x: r.left + r.width / 2 + window.scrollX, y: r.top + r.height / 2 + window.scrollY, t: r.top + window.scrollY, b: r.bottom + window.scrollY, l: r.left + window.scrollX, r: r.right + window.scrollX };
            }

            function curvedArrow(x1, y1, x2, y2, color, markerId) {
                const dx = x2 - x1, dy = y2 - y1;
                const cx = x1 + dx * 0.5, cy = Math.min(y1, y2) - 30;
                const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                path.setAttribute('d', 'M' + x1 + ',' + y1 + ' Q' + cx + ',' + cy + ' ' + x2 + ',' + y2);
                path.setAttribute('fill', 'none');
                path.setAttribute('stroke', color);
                path.setAttribute('stroke-width', '1.5');
                path.setAttribute('stroke-dasharray', '6,3');
                path.setAttribute('opacity', '0.7');
                path.setAttribute('marker-end', 'url(#' + markerId + ')');
                path.setAttribute('class', 'dep-arrow');
                svg.appendChild(path);
            }

            // btype B_TYPE header → ExpQty badge
            const btypeHead = document.querySelector('#btypeArea th:first-child');
            const expBadge = document.querySelector('#expqtyPanel .key-btype');
            if (btypeHead && expBadge) {
                const s = getCenter(btypeHead), t = getCenter(expBadge);
                curvedArrow(s.r, s.t, t.l, t.y, '#d4a017', 'ah-btype');
            }

            // btype B_TYPE header → Theoretical badge
            const thBadgeBtype = document.querySelector('#thqtyPanel .key-btype');
            if (btypeHead && thBadgeBtype) {
                const s = getCenter(btypeHead), t = getCenter(thBadgeBtype);
                curvedArrow(s.r, s.t - 5, t.l, t.y, '#d4a017', 'ah-btype');
            }

            // btype ESNXX header → Spec badge
            const esnxxHead = document.querySelector('#btypeArea th:nth-child(2)');
            const specBadge = document.querySelector('#esnxxPanel .key-esnxx');
            if (esnxxHead && specBadge) {
                const s = getCenter(esnxxHead), t = getCenter(specBadge);
                curvedArrow(s.r, s.t, t.l, t.y, '#2b8a3e', 'ah-esnxx');
            }

            // Toolbar PLINE → Lead Times badge
            const plineSel = document.getElementById('plineSelect');
            const leadBadge = document.querySelector('#leadtPanel .key-pline');
            if (plineSel && leadBadge) {
                const s = getCenter(plineSel), t = getCenter(leadBadge);
                curvedArrow(s.r, s.b, t.x, t.t, '#1864ab', 'ah-pline');
            }

            // Toolbar PLINE → Theoretical PLINE badge
            const thBadgePline = document.querySelector('#thqtyPanel .key-pline');
            if (plineSel && thBadgePline) {
                const s = getCenter(plineSel), t = getCenter(thBadgePline);
                curvedArrow(s.r + 20, s.b, t.x, t.t, '#1864ab', 'ah-pline');
            }
        }

        window.addEventListener('resize', drawArrows);

        loadLines();
    </script>
</body>
</html>
